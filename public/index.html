<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Dashboard Pium</title>
  </head>
  <body>
    <h1>System Dashboard</h1>

    <div class="quick-stats">
      <div class="card">
        <h3>Red (Descarga/Subida)</h3>
        <p>
          <span id="net-down">0 B/s</span> ↓ / <span id="net-up">0 B/s</span> ↑
        </p>
      </div>
      <div class="card">
        <h3>Batería</h3>
        <p><span id="batt-level">--</span>% <span id="batt-status"></span></p>
      </div>
    </div>

    <div class="dashboard-container">
      <canvas id="cpuChart"></canvas>

      <div class="ram-container">
        <p>Memoria RAM: <span id="ram-text">Cargando...</span></p>
        <div class="progress-bar">
          <div id="ram-bar" class="progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="dashboard-container">
      <h2>Histórico (Últimas horas)</h2>
      <canvas id="historyChart"></canvas>
    </div>

    <div class="dashboard-container">
      <div class="proc-header">
        <h2>Procesos Principales</h2>
        <div class="btn-group">
          <button id="btn-cpu" class="active">Por CPU</button>
          <button id="btn-mem">Por RAM</button>
        </div>
      </div>
      <table id="proc-table">
        <thead>
          <tr>
            <th>PID</th>
            <th>Nombre</th>
            <th id="th-value">CPU %</th>
          </tr>
        </thead>
        <tbody id="proc-body"></tbody>
      </table>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
