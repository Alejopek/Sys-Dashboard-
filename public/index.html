<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Panel de monitoreo del sistema en tiempo real — CPU, RAM, Red y procesos activos." />
    <title>SysDash — Monitor del Sistema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/assets/favicons/favicon-96x96.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicons/favicon.ico" />
    <link rel="manifest" href="/assets/favicons/site.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="SysDash" />
  </head>
  <body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <span class="brand-name">SysDash</span>
      </div>

      <nav class="sidebar-nav">
        <span class="nav-label">Monitor</span>
        <a href="#" class="nav-item active" id="nav-overview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          General
        </a>
        <a href="#" class="nav-item" id="nav-cpu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="2" x2="9" y2="4"/><line x1="15" y1="2" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="22"/><line x1="15" y1="20" x2="15" y2="22"/><line x1="20" y1="9" x2="22" y2="9"/><line x1="20" y1="14" x2="22" y2="14"/><line x1="2" y1="9" x2="4" y2="9"/><line x1="2" y1="14" x2="4" y2="14"/></svg>
          CPU
        </a>
        <a href="#" class="nav-item" id="nav-memory">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 19v-3M10 19v-3M14 19v-3M18 19v-3M2 11h20M2 7l2-4h16l2 4"/><rect x="2" y="11" width="20" height="8" rx="1"/></svg>
          Memoria
        </a>
        <a href="#" class="nav-item" id="nav-network">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M12 2a10 10 0 0 1 0 20M12 2a10 10 0 0 0 0 20M2 12h20M12 2c-4 6-4 14 0 20M12 2c4 6 4 14 0 20"/></svg>
          Red
        </a>
        <span class="nav-label" style="margin-top: 1rem;">Sistema</span>
        <a href="#" class="nav-item" id="nav-processes">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Procesos
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="status-dot"></div>
        <span class="status-text">Conectado</span>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title">Panel General</h1>
          <span class="page-subtitle">Monitoreo en tiempo real</span>
        </div>
        <div class="topbar-right">
          <div class="time-badge" id="live-time">--:--:--</div>
        </div>
      </header>

      <!-- STAT CARDS -->
      <section class="stat-cards">
        <div class="stat-card" id="card-cpu">
          <div class="stat-card-header">
            <span class="stat-label">CPU</span>
            <div class="stat-icon stat-icon--teal">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></svg>
            </div>
          </div>
          <div class="stat-value" id="stat-cpu-val">--%</div>
          <div class="stat-bar-wrap">
            <div class="stat-bar">
              <div class="stat-bar-fill stat-bar-fill--teal" id="stat-cpu-bar"></div>
            </div>
          </div>
        </div>

        <div class="stat-card" id="card-ram">
          <div class="stat-card-header">
            <span class="stat-label">RAM</span>
            <div class="stat-icon stat-icon--blue">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 19v-3M10 19v-3M14 19v-3M18 19v-3M2 11h20"/><rect x="2" y="7" width="20" height="12" rx="1"/></svg>
            </div>
          </div>
          <div class="stat-value" id="stat-ram-val">-- GB</div>
          <div class="stat-detail" id="ram-text">Cargando...</div>
          <div class="stat-bar-wrap">
            <div class="stat-bar">
              <div class="stat-bar-fill stat-bar-fill--blue" id="ram-bar"></div>
            </div>
          </div>
        </div>

        <div class="stat-card" id="card-net">
          <div class="stat-card-header">
            <span class="stat-label">Red</span>
            <div class="stat-icon stat-icon--purple">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
          </div>
          <div class="stat-net">
            <div class="net-row">
              <span class="net-dir net-dir--down">↓</span>
              <span class="net-val" id="net-down">0 B/s</span>
            </div>
            <div class="net-row">
              <span class="net-dir net-dir--up">↑</span>
              <span class="net-val" id="net-up">0 B/s</span>
            </div>
          </div>
        </div>

        <div class="stat-card" id="card-batt">
          <div class="stat-card-header">
            <span class="stat-label">Batería</span>
            <div class="stat-icon stat-icon--amber">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
            </div>
          </div>
          <div class="stat-value batt-value">
            <span id="batt-level">--</span><span class="stat-unit">%</span>
            <span id="batt-status" class="batt-status-icon"></span>
          </div>
          <div class="stat-bar-wrap">
            <div class="stat-bar">
              <div class="stat-bar-fill stat-bar-fill--amber" id="batt-bar"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- CHARTS ROW -->
      <section class="charts-row">
        <div class="chart-card chart-card--main">
          <div class="chart-card-header">
            <div>
              <h2 class="chart-title">Uso de CPU</h2>
              <span class="chart-subtitle">Últimos 20 puntos</span>
            </div>
            <div class="chart-badge" id="cpu-live-badge">LIVE</div>
          </div>
          <div class="chart-wrap">
            <canvas id="cpuChart"></canvas>
          </div>
        </div>

        <div class="chart-card chart-card--side">
          <div class="chart-card-header">
            <div>
              <h2 class="chart-title">Historial</h2>
              <span class="chart-subtitle">CPU &amp; RAM promedio</span>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="historyChart"></canvas>
          </div>
        </div>
      </section>

      <!-- PROCESSES TABLE -->
      <section class="proc-section">
        <div class="proc-card">
          <div class="proc-header">
            <div>
              <h2 class="chart-title">Procesos</h2>
              <span class="chart-subtitle">Top 5 activos</span>
            </div>
            <div class="btn-group">
              <button id="btn-cpu" class="tab-btn active">CPU</button>
              <button id="btn-mem" class="tab-btn">RAM</button>
            </div>
          </div>
          <table id="proc-table">
            <thead>
              <tr>
                <th>PID</th>
                <th>Proceso</th>
                <th id="th-value">CPU %</th>
              </tr>
            </thead>
            <tbody id="proc-body"></tbody>
          </table>
        </div>
      </section>

    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
